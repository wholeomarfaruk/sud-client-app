<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute;left:0;right:0;bottom:0;height:62px;background:#fff;border-top:1px solid #ECF0ED;box-shadow:0 -4px 16px rgba(15,107,46,.05);display:flex;align-items:center;justify-content:space-around;padding-bottom:7px;font-family:'Plus Jakarta Sans',system-ui,sans-serif">
<div style="display:flex;flex-direction:column;align-items:center;gap:3px;color:{{ cDash }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg><span style="font-size:10px;font-weight:600">Dashboard</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:3px;color:{{ cOffers }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7"/></svg><span style="font-size:10px;font-weight:600">Offers</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:3px;color:{{ cNews }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></svg><span style="font-size:10px;font-weight:600">News</span></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:3px;color:{{ cMenu }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg><span style="font-size:10px;font-weight:600">Menu</span></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:372,&quot;height&quot;:62},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dashboard&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;offers&quot;,&quot;news&quot;,&quot;menu&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active || 'menu';
    const on = '#1B8A3D', off = '#9AA89F';
    return {
      cDash:   a === 'dashboard' ? on : off,
      cOffers: a === 'offers'    ? on : off,
      cNews:   a === 'news'      ? on : off,
      cMenu:   a === 'menu'      ? on : off,
    };
  }
}
</script>
</body>
</html>
